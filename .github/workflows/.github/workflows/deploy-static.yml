name: Publicar HTML estático

on:
  push:
    branches:
      - principal
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar arquivos da loja
        run: |
          mkdir _site
          cp index.html _site/index.html
          cp 404.html _site/404.html || cp index.html _site/404.html
          cp CNAME _site/CNAME || true
          cp robots.txt _site/robots.txt || true
          cp sitemap.xml _site/sitemap.xml || true
          cp favicon.svg _site/favicon.svg || true
          touch _site/.nojekyll
          if [ -d public ]; then cp -R public _site/public; fi
          if [ -f logo-afiliado-impacto360.png ]; then mkdir -p _site/public && cp logo-afiliado-impacto360.png _site/public/; fi

      - name: Enviar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
