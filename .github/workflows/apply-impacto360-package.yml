name: Apply Impacto360 package

on:
  push:
    branches:
      - organizar-shopping-lojas-produtos-mobile
    paths:
      - ".codex-transport/impacto360/**"
      - ".github/workflows/apply-impacto360-package.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: organizar-shopping-lojas-produtos-mobile
          fetch-depth: 0
      - name: Apply package
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir=".codex-transport/impacto360"
          cat "$pkg_dir"/package.b64.part* > "$pkg_dir/package.tar.xz.b64"
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.codex-transport/impacto360/package.tar.xz.b64')
          s = p.read_text()
          needle = 'XXJppvCilZU0+Xj1Ru8aYqGB06HaA0bA5HoH3cAU'
          fixed = 'XXJppvCilZU0+Xj1Ru8a3/aYqGB06HaA0bA5HoH3cAU'
          if needle in s and fixed not in s:
              s = s.replace(needle, fixed, 1)
          p.write_text(s)
          PY
          base64 -d "$pkg_dir/package.tar.xz.b64" > "$pkg_dir/package.tar.xz"
          actual="$(sha256sum "$pkg_dir/package.tar.xz" | awk '{print toupper($1)}')"
          expected="4CB18CCA4BA17C2BCC978241418EA6AAA3068326284CEE30B977AEAEE97EA2A9"
          if [ "$actual" != "$expected" ]; then
            echo "SHA mismatch: $actual"
            exit 1
          fi
          tar -xJf "$pkg_dir/package.tar.xz" -C .
          rm -rf "$pkg_dir"
          rmdir .codex-transport 2>/dev/null || true
          rm -f .github/workflows/apply-impacto360-package.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Organizar Shopping Impacto360, importar produtos e melhorar mobile"
          git push origin HEAD:organizar-shopping-lojas-produtos-mobile
